name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sokode_core
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test
